<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard - RastreaFormacom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<header>
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">RastreaFormacom</a>
      <div>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Cerrar sesión</button>
      </div>
    </div>
  </nav>
</header>
<main class="flex-grow-1">

<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Nuevo Contacto</h5>
        </div>
        <div class="card-body">
          <form id="contactForm">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" id="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control">
            </div>
            <div class="mb-3">
              <label for="edad" class="form-label">Edad</label>
              <input type="number" id="edad" class="form-control" min="0" max="150">
            </div>
            <button class="btn btn-success w-100" type="submit">Crear Contacto</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Mis Contactos</h5>
        </div>
        <div class="card-body">
          <div id="contactsArea">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</main>

<!-- Modal de Edición -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Contacto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label for="editNombre" class="form-label">Nombre</label>
            <input type="text" id="editNombre" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="editEmail" class="form-label">Email</label>
            <input type="email" id="editEmail" class="form-control">
          </div>
          <div class="mb-3">
            <label for="editEdad" class="form-label">Edad</label>
            <input type="number" id="editEdad" class="form-control" min="0" max="150">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="saveEdit()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

const token = localStorage.getItem('token');
let editModal = null;

if(!token) { location = 'login.html'; }

editModal = new bootstrap.Modal(document.getElementById('editModal'));

async function loadContacts(){
  try {
    const res = await fetch('/api/contacts', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if(res.status === 401) { localStorage.removeItem('token'); location='login.html'; return; }
    const data = await res.json();
    renderContacts(data);
  } catch(err) {
    document.getElementById('contactsArea').innerHTML = '<div class="alert alert-danger">Error al cargar contactos</div>';
    console.error(err);
  }
}

function renderContacts(list){
  const cont = document.getElementById('contactsArea');
  if(!list || list.length === 0) {
    cont.innerHTML = '<div class="alert alert-info">Sin contactos aún. Crea uno!</div>';
    return;
  }
  const table = document.createElement('div');
  table.className = 'table-responsive';
  table.innerHTML = `
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Edad</th>
          <th style="width:120px;">Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => `
          <tr>
            <td>${esc(c.nombre)}</td>
            <td><small>${esc(c.email || '-')}</small></td>
            <td><small>${c.edad || '-'}</small></td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="editContact('${c._id}', '${esc(c.nombre)}', '${esc(c.email||'')}', ${c.edad||''})">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deleteContact('${c._id}')">Eliminar</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  cont.innerHTML = '';
  cont.appendChild(table);
}

function esc(txt){
  if(!txt) return '';
  return String(txt).replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('contactForm').addEventListener('submit', async e => {
  e.preventDefault();
  const nombre = document.getElementById('nombre').value.trim();
  const email = document.getElementById('email').value.trim() || null;
  const edad = document.getElementById('edad').value ? parseInt(document.getElementById('edad').value) : null;
  if(edad !== null && (edad < 0 || edad > 150)) { alert('Edad debe estar entre 0 y 150'); return; }

  try {
    const res = await fetch('/api/contacts', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, edad })
    });
    if(!res.ok) { alert('Error al crear contacto'); return; }
    document.getElementById('contactForm').reset();
    loadContacts();
  } catch(err) { alert('Error de red'); console.error(err); }
});

function editContact(id, nombre, email, edad){
  document.getElementById('editId').value = id;
  document.getElementById('editNombre').value = nombre;
  document.getElementById('editEmail').value = email;
  document.getElementById('editEdad').value = edad;
  editModal.show();
}

async function saveEdit(){
  const id = document.getElementById('editId').value;
  const nombre = document.getElementById('editNombre').value.trim();
  const email = document.getElementById('editEmail').value.trim() || null;
  const edad = document.getElementById('editEdad').value ? parseInt(document.getElementById('editEdad').value) : null;
  if(edad !== null && (edad < 0 || edad > 150)) { alert('Edad debe estar entre 0 y 150'); return; }

  try {
    const res = await fetch('/api/contacts/' + id, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, email, edad })
    });
    if(!res.ok) { alert('Error al editar'); return; }
    editModal.hide();
    loadContacts();
  } catch(err) { alert('Error de red'); console.error(err); }
}

async function deleteContact(id){
  if(!confirm('¿Estás seguro?')) return;
  try {
    const res = await fetch('/api/contacts/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if(!res.ok) { alert('Error al eliminar'); return; }
    loadContacts();
  } catch(err) { alert('Error de red'); console.error(err); }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('token');
  location = 'login.html';
});

loadContacts();
setInterval(loadContacts, 30000);

</script>

<footer class="text-center py-3 mt-4" style="background:#ffc0cb;">
  <div class="container">
    <small>&copy; 2026 RastreaFormacom. Todos los derechos reservados.</small>
  </div>
</footer>

</body>
</html>
