<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Login - RastreaFormacom</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
<header>
  <nav class="navbar navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">RastreaFormacom</a>
    </div>
  </nav>
</header>
<main class="flex-grow-1">
	<div class="card mx-auto shadow" style="max-width:400px;">
		<div class="card-body">
			<h3 class="text-success mb-3">Login</h3>

<div id="loginMessage" class="mb-3 text-center"></div>
        <form id="loginForm">
				<div class="mb-3">
					<input type="email" id="email" class="form-control" placeholder="Email" required>
				</div>
				<div class="mb-3">
					<input type="password" id="password" class="form-control" placeholder="Password" required>
				</div>
				<button class="btn btn-success w-100" type="submit">Entrar</button>
			</form>

			<p class="mt-3 text-center">
				<a href="register.html">Crear cuenta</a>
			</p>

		</div>
	</div>
</div>

<script>
// redirect if already logged in
(function(){
  const token = localStorage.getItem('token');
  if(token) location = 'dashboard.html';
})();

const form = document.getElementById('loginForm');
const msgDiv = document.getElementById('loginMessage');
form.addEventListener('submit', async e => {
	e.preventDefault();
	const email = document.getElementById('email').value;
	const password = document.getElementById('password').value;

	try {
		const res = await fetch('/api/auth/login', {
			method: 'POST',
			headers: { 'Content-Type':'application/json' },
			body: JSON.stringify({ email, password })
		});
		const data = await res.json();
		if(!res.ok){
			msgDiv.textContent = data.error || JSON.stringify(data);
			msgDiv.className = 'mb-3 text-danger';
			return;
		}
		localStorage.setItem('token', data.token);
		msgDiv.textContent = 'Login correcto';
		msgDiv.className = 'mb-3 text-success';
		setTimeout(()=> window.location='dashboard.html',500);
	} catch(err){
		msgDiv.textContent = 'Error de red';
		msgDiv.className = 'mb-3 text-danger';
		console.error(err);
	}
});
</script>
</main>

<footer class="text-center py-3 mt-4" style="background:#ffc0cb;">
  <div class="container">
    <small>&copy; 2026 RastreaFormacom. Todos los derechos reservados.</small>
  </div>
</footer>

</body>
</html>
