<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - RastreaFormacom</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
<header>
  <nav class="navbar navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">RastreaFormacom</a>
    </div>
  </nav>
</header>
<main class="flex-grow-1">

<div class="container mt-5">
<div class="card mx-auto shadow" style="max-width:400px;">
<div class="card-body">
<h3 class="text-success mb-3">Registro</h3>

<div id="registerMessage" class="mb-3 text-center"></div>
<form id="registerForm">
  <div class="mb-3">
    <input type="text" id="nombre" class="form-control" placeholder="Nombre completo" required>
  </div>
  <div class="mb-3">
    <input type="email" id="email" class="form-control" placeholder="Email" required>
  </div>
  <div class="mb-3">
    <input type="password" id="password" class="form-control" placeholder="Password" required>
  </div>
  <div class="mb-3">
    <input type="password" id="password2" class="form-control" placeholder="Confirmar Password" required>
  </div>
  <div class="mb-3">
    <input type="number" id="edad" class="form-control" placeholder="Edad" min="18" required>
  </div>
  <button class="btn btn-success w-100" type="submit">Registrarse</button>
</form>

<p class="mt-3 text-center">
<a href="login.html">Ya tengo cuenta</a>
</p>

</div>
</div>
</div>

<script>
// redirect if already logged in
(function(){
  const token = localStorage.getItem('token');
  if(token) location = 'dashboard.html';
})();

const form = document.getElementById("registerForm");

form.addEventListener("submit", async e => {
  e.preventDefault();
  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;
  const edad = parseInt(document.getElementById("edad").value, 10);

  if(password !== password2){ alert('Las contraseñas no coinciden'); return; }
  if(Number.isNaN(edad) || edad < 18){ alert('Debes tener al menos 18 años'); return; }

  const res = await fetch("/api/auth/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ nombre, email, password, edad })
  });

  const data = await res.json();
  const msg = document.getElementById('registerMessage');
  if(!res.ok){
    msg.textContent = data.error || data.message || JSON.stringify(data);
    msg.className = 'mb-3 text-danger';
    return;
  }
  // if backend returns token, store and go to dashboard
  if(data.token) localStorage.setItem('token', data.token);
  msg.textContent = data.message || 'Registro correcto';
  msg.className = 'mb-3 text-success';
  setTimeout(() => window.location = "dashboard.html", 500);
});
</script>
</main>

<footer class="text-center py-3 mt-4" style="background:#ffc0cb;">
  <div class="container">
    <small>&copy; 2026 RastreaFormacom. Todos los derechos reservados.</small>
  </div>
</footer>

</body>
</html>
